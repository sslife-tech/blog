version: 2.1

orbs:
  hugo: circleci/hugo@0.5.2

jobs:
  build:
    docker:
      - image: cibuilds/hugo
    steps:
      - checkout
      - run:
          name: Checkout Submodules
          command: |
            git submodule sync
            git submodule update --init --recursive
      - run: hugo -e production --minify -v
      - persist_to_workspace:
          root: .
          paths:
            - ./public

  deploy:
    working_directory:
    docker:
      - image: circleci/node:14
    steps:
      - checkout
      - attach_workspace:
          at: .
      - restore_cache:
          name: Restore yarn dependencies
          keys:
            - node-14-{{ checksum "package-lock.json" }}
      - run:
          name: Install dependencies
          command: yarn install --production=false
      - save_cache:
          name: Save yarn dependencies
          key: node-14-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - deploy:
          command: npm run deploy -- --only hosting --token ${FIREBASE_TOKEN}

workflows:
  default:
    jobs:
      - build
      - deploy:
          requires:
            - build
          filters:
            branches:
              only: master
